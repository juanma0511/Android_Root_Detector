name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.1)'
        required: true
        default: 'v3.1'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle wrappers and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache NDK / CMake build output
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ndk-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ runner.os }}-

      - name: Setup keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"           >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"     >> $GITHUB_ENV
          else
            keytool -genkey -noprompt -v \
              -keystore keystore.jks \
              -alias kknd \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=KkndDetector,O=KkndDetector,C=US" \
              -storepass kknddetector \
              -keypass kknddetector
            echo "STORE_PASSWORD=kknddetector" >> $GITHUB_ENV
            echo "KEY_ALIAS=kknd"              >> $GITHUB_ENV
            echo "KEY_PASSWORD=kknddetector"   >> $GITHUB_ENV
            base64 -w0 keystore.jks > keystore_generated_b64.txt
            echo "::notice::No KEYSTORE_BASE64 secret found — a new keystore was auto-generated. Download the keystore_b64 artifact and save it as the KEYSTORE_BASE64 secret so future releases use the same key."
          fi

      - name: Upload generated keystore (if auto-created)
        if: ${{ env.KEY_ALIAS == 'kknd' }}
        uses: actions/upload-artifact@v4
        with:
          name: keystore_b64
          path: keystore_generated_b64.txt
          retention-days: 7

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Release APKs
        run: ./gradlew assembleRelease

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ github.ref_name || inputs.tag }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: KKND Detector ${{ github.ref_name || inputs.tag }}
          body: |
            ## What's new in ${{ github.ref_name || inputs.tag }}

            - 71 native detection functions across all root/hook vectors
            - SELinux `attr/current` write probe — detects root contexts in policy
            - DirtySepolicy access rule checks via `selinux_check_access`
            - Resetprop modification detection across all partition prop files
            - PIF / TrickyStore spoof config detection
            - Floating MD3 pill navigation bar
            - All contributors shown in the About section with GitHub avatars
            - Split APKs: `arm64-v8a` and `armeabi-v7a`

            Two APKs are attached below — pick the one matching your device ABI.
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
